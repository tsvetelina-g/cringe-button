<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cringe Button</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 56px;
      background: radial-gradient(circle at 50% 38%, #2a2a30 0%, #141417 55%, #0b0b0d 100%);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    body.shake { animation: screenShake 0.38s ease; }

    .header {
      position: absolute;
      top: 46px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
    }
    .header .kicker {
      font-family: 'Anton', sans-serif;
      font-size: 18px;
      letter-spacing: 7px;
      color: #e23b3b;
      text-transform: uppercase;
    }
    .header h1 {
      margin: 6px 0 0;
      font-family: 'Anton', sans-serif;
      font-size: 64px;
      line-height: 0.92;
      letter-spacing: 2px;
      color: #f4f4f6;
      text-transform: uppercase;
    }
    .header .sub {
      margin-top: 10px;
      font-size: 14px;
      letter-spacing: 3px;
      color: #7d7d86;
      text-transform: uppercase;
    }

    .button-wrap {
      position: relative;
      width: 340px;
      height: 300px;
      cursor: pointer;
    }

    .base {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 330px;
      height: 150px;
      border-radius: 50%;
      background: linear-gradient(180deg, #4a4a4f 0%, #2a2a2e 100%);
      box-shadow: 0 26px 50px rgba(0, 0, 0, 0.55);
    }
    .ring {
      position: absolute;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%);
      width: 300px;
      height: 140px;
      border-radius: 50%;
      background: linear-gradient(180deg, #c4c4c8 0%, #9a9a9f 100%);
    }
    .well {
      position: absolute;
      left: 50%;
      bottom: 50px;
      transform: translateX(-50%);
      width: 248px;
      height: 120px;
      border-radius: 50%;
      background: #5e0d0d;
    }
    .top {
      position: absolute;
      left: 50%;
      bottom: 56px;
      transform: translateX(-50%);
      width: 248px;
      height: 118px;
      border-radius: 50%;
      background: radial-gradient(ellipse 60% 55% at 42% 36%, #ff4d4d 0%, #e51c1c 52%, #b81111 100%);
      box-shadow: inset 0 -10px 22px rgba(120, 0, 0, 0.55), inset 0 8px 18px rgba(255, 180, 180, 0.35);
      transition: bottom 0.07s ease;
    }
    .gloss {
      position: absolute;
      left: 50%;
      bottom: 130px;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0));
      transition: bottom 0.07s ease;
      pointer-events: none;
    }
    .button-wrap.pressed .top { bottom: 44px; }
    .button-wrap.pressed .gloss { bottom: 118px; }

    .pop {
      position: absolute;
      left: 50%;
      top: 90px;
      font-family: 'Anton', sans-serif;
      font-size: 46px;
      color: #ff4040;
      text-transform: uppercase;
      letter-spacing: 1px;
      pointer-events: none;
      text-shadow: 0 4px 0 #6e0000;
      animation: floatPop 0.95s ease-out forwards;
    }

    .counter {
      display: flex;
      align-items: baseline;
      gap: 12px;
      color: #6a6a73;
      font-size: 15px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .counter .num {
      font-family: 'Anton', sans-serif;
      font-size: 30px;
      color: #e23b3b;
      letter-spacing: 1px;
    }

    @keyframes floatPop {
      0%   { transform: translate(-50%, 0) scale(0.6); opacity: 0; }
      15%  { transform: translate(-50%, -10px) scale(1.1); opacity: 1; }
      100% { transform: translate(-50%, -150px) scale(1.4); opacity: 0; }
    }
    @keyframes screenShake {
      0%, 100% { transform: translate(0, 0); }
      20% { transform: translate(-6px, 4px); }
      40% { transform: translate(5px, -5px); }
      60% { transform: translate(-4px, -3px); }
      80% { transform: translate(4px, 4px); }
    }

    @media (max-width: 520px) {
      .header h1 { font-size: 40px; }
      .header .kicker { font-size: 13px; letter-spacing: 5px; }
      .button-wrap { transform: scale(0.85); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="kicker">Official</div>
    <h1>Cringe Button</h1>
    <div class="sub">Press only in emergencies</div>
  </div>

  <div class="button-wrap" id="button" role="button" aria-label="Cringe button" tabindex="0">
    <div class="base"></div>
    <div class="ring"></div>
    <div class="well"></div>
    <div class="top"></div>
    <div class="gloss"></div>
  </div>

  <div class="counter">
    <span>Cringes dispensed</span>
    <span class="num" id="count">0</span>
  </div>

  <script>
    (function () {
      var button = document.getElementById('button');
      var countEl = document.getElementById('count');
      var count = 0;
      var upTimer, shakeTimer;

      function speak() {
        try {
          var synth = window.speechSynthesis;
          if (!synth) return;
          synth.cancel();
          var u = new SpeechSynthesisUtterance('cringe');
          u.rate = 0.85;
          u.pitch = 0.7;
          u.volume = 1;
          synth.speak(u);
        } catch (e) {}
      }

      function spawnPop() {
        var pop = document.createElement('div');
        pop.className = 'pop';
        pop.textContent = 'cringe';
        button.appendChild(pop);
        setTimeout(function () { pop.remove(); }, 1000);
      }

      function press() {
        count++;
        countEl.textContent = count;

        button.classList.add('pressed');
        clearTimeout(upTimer);
        upTimer = setTimeout(function () { button.classList.remove('pressed'); }, 90);

        document.body.classList.add('shake');
        clearTimeout(shakeTimer);
        shakeTimer = setTimeout(function () { document.body.classList.remove('shake'); }, 380);

        spawnPop();
        speak();
      }

      button.addEventListener('click', press);
      button.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); press(); }
      });
    })();
  </script>
</body>
</html>
